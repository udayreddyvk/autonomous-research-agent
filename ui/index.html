<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Research Agent</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #030108;
            --deep-purple: #0a0514;
            --panel-bg: rgba(8, 4, 16, 0.78);
            --panel-border: rgba(0, 240, 255, 0.12);
            --holo-cyan: #00f0ff;
            --holo-cyan-dim: rgba(0, 240, 255, 0.12);
            --holo-cyan-glow: rgba(0, 240, 255, 0.35);
            --amber: #ff9e40;
            --amber-dim: rgba(255, 158, 64, 0.2);
            --ink: #e0d8f0;
            --muted: #6b5f80;
            --line: rgba(0, 240, 255, 0.1);
            --hot: #ff5a8a;
            --hot-dim: rgba(255, 90, 138, 0.2);
            --green: #00ffaa;
            --shadow: 0 34px 95px rgba(0, 0, 0, 0.72);
            --font-display: "Orbitron", sans-serif;
            --font-body: "Rajdhani", sans-serif;
            --font-mono: "Share Tech Mono", monospace;
            --ease-cinematic: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-snap: cubic-bezier(0.87, 0, 0.13, 1);
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: var(--font-body);
            background: var(--void);
            overflow-x: hidden;
        }

        #void-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 240, 255, 0.015) 2px,
                    rgba(0, 240, 255, 0.015) 4px
                );
            opacity: 0.6;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--void); }
        ::-webkit-scrollbar-thumb { background: var(--holo-cyan-dim); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--holo-cyan); }

        button, input, select { font: inherit; }
        button { border: 0; background: none; cursor: pointer; }

        /* ===== SCROLL REVEAL SYSTEM ===== */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.9s var(--ease-cinematic), transform 0.9s var(--ease-cinematic);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.35s; }
        .reveal-delay-4 { transition-delay: 0.5s; }
        .reveal-delay-5 { transition-delay: 0.7s; }

        /* ===== HERO ENTRANCE ANIMATIONS ===== */
        .hero-entrance {
            opacity: 0;
            transform: translateY(60px);
            animation: heroFadeUp 1.2s var(--ease-cinematic) forwards;
        }
        .hero-entrance-delay-1 { animation-delay: 0.2s; }
        .hero-entrance-delay-2 { animation-delay: 0.45s; }
        .hero-entrance-delay-3 { animation-delay: 0.7s; }
        .hero-entrance-delay-4 { animation-delay: 0.95s; }
        .hero-entrance-delay-5 { animation-delay: 1.2s; }

        @keyframes heroFadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== AURORA BACKGROUND ===== */
        .aurora-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(60, 20, 120, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(0, 240, 255, 0.06), transparent);
            animation: auroraShift 20s ease-in-out infinite alternate;
        }

        @keyframes auroraShift {
            0% { transform: translateX(-5%) translateY(-3%) scale(1.05); }
            100% { transform: translateX(5%) translateY(3%) scale(0.95); }
        }

        .app {
            position: relative;
            z-index: 2;
            width: min(1500px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 0 0 40px;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 50%, rgba(60, 20, 100, 0.15), transparent 70%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 240, 255, 0.06), transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-glyph {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            color: var(--holo-cyan);
            opacity: 0;
            text-transform: uppercase;
            margin-bottom: 24px;
            animation: glyphPulse 4s ease-in-out infinite, heroFadeUp 1s var(--ease-cinematic) 0.1s forwards;
        }

        @keyframes glyphPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .hero h1 {
            margin: 0;
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 7vw, 6.5rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink);
            text-shadow:
                0 0 40px rgba(0, 240, 255, 0.2),
                0 0 80px rgba(100, 50, 200, 0.15);
        }

        .hero-line { display: block; }

        .hero-accent {
            color: var(--holo-cyan);
            text-shadow:
                0 0 30px rgba(0, 240, 255, 0.4),
                0 0 60px rgba(0, 240, 255, 0.2);
        }

        .hero-sub {
            margin-top: 28px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            letter-spacing: 0.25em;
            color: var(--muted);
            text-transform: uppercase;
            opacity: 0;
            animation: heroFadeUp 1s var(--ease-cinematic) 1.1s forwards;
        }

        .hero-divider {
            width: 120px;
            height: 1px;
            margin: 32px auto;
            background: linear-gradient(90deg, transparent, var(--holo-cyan), transparent);
            opacity: 0;
            animation: heroFadeUp 1s var(--ease-cinematic) 0.85s forwards;
        }

        .hero-desc {
            max-width: 560px;
            margin: 0 auto;
            color: var(--muted);
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 400;
            opacity: 0;
            animation: heroFadeUp 1s var(--ease-cinematic) 1.3s forwards;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--holo-cyan);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            opacity: 0;
            animation: heroFadeUp 1s var(--ease-cinematic) 1.6s forwards, bounce 2s ease-in-out infinite 2s;
            background: none;
            border: none;
            cursor: pointer;
        }

        .scroll-indicator svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* ===== SECTION DIVIDER ===== */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 40px 0;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0;
        }
        .section-divider.visible { opacity: 1; }
        .section-divider.visible .divider-line { width: 100%; }
        .section-divider.visible .hex-icon { transform: scale(1) rotate(0deg); opacity: 0.5; }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--panel-border), transparent);
            width: 0%;
            transition: width 1.2s var(--ease-cinematic);
        }

        .hex-icon {
            width: 12px;
            height: 14px;
            background: var(--holo-cyan);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            opacity: 0;
            transform: scale(0) rotate(45deg);
            transition: all 0.8s var(--ease-cinematic) 0.3s;
            animation: hexPulse 2s ease-in-out infinite 1.5s;
        }

        @keyframes hexPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* ===== WORKBENCH ===== */
        .workbench {
            display: grid;
            grid-template-columns: minmax(0, 1.55fr) minmax(330px, 0.8fr);
            gap: 22px;
            align-items: start;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--holo-cyan), transparent);
            opacity: 0.4;
        }

        .control-panel, .report-panel, .side-panel { border-radius: 4px; }

        .control-panel {
            padding: 24px;
            margin-bottom: 22px;
            margin-top: 2px;
            background:
                linear-gradient(145deg, rgba(0, 240, 255, 0.04), transparent 40%),
                var(--panel-bg);
        }

        .control-grid {
            display: grid;
            grid-template-columns: minmax(260px, 1.4fr) 170px minmax(210px, 0.9fr);
            gap: 14px;
        }

        label {
            display: block;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-bottom: 9px;
            text-transform: uppercase;
        }

        input[type="text"], select {
            width: 100%;
            height: 48px;
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background: rgba(3, 1, 8, 0.7);
            color: var(--ink);
            padding: 0 14px;
            outline: none;
            font-family: var(--font-body);
            font-size: 1rem;
            letter-spacing: 0.02em;
            transition: border-color 0.3s var(--ease-cinematic), box-shadow 0.3s var(--ease-cinematic);
        }

        input[type="text"]::placeholder { color: var(--muted); opacity: 0.5; }

        .select-shell { position: relative; }

        .select-shell select {
            appearance: none;
            -webkit-appearance: none;
            padding-right: 44px;
            background:
                linear-gradient(145deg, rgba(0, 240, 255, 0.06), rgba(100, 50, 200, 0.04)),
                rgba(3, 1, 8, 0.9);
            border-color: var(--panel-border);
            box-shadow: inset 0 1px 0 rgba(0, 240, 255, 0.05);
        }

        .select-shell::after {
            content: "";
            position: absolute;
            right: 16px;
            top: 50%;
            width: 8px;
            height: 8px;
            border-right: 1.5px solid var(--holo-cyan);
            border-bottom: 1.5px solid var(--holo-cyan);
            transform: translateY(-65%) rotate(45deg);
            pointer-events: none;
            opacity: 0.7;
        }

        .select-shell.disabled { opacity: 0.5; }

        select option { color: var(--ink); background: #0a0514; }

        input[type="text"]:focus, select:focus {
            border-color: var(--holo-cyan);
            box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.08), 0 0 24px rgba(0, 240, 255, 0.1);
        }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .mode-card {
            min-height: 100px;
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background:
                linear-gradient(145deg, rgba(0, 240, 255, 0.04), transparent),
                rgba(255, 255, 255, 0.02);
            color: var(--ink);
            cursor: pointer;
            padding: 14px;
            text-align: left;
            transition: transform 0.4s var(--ease-cinematic), border-color 0.4s var(--ease-cinematic), background 0.4s var(--ease-cinematic), box-shadow 0.4s var(--ease-cinematic);
            position: relative;
            overflow: hidden;
        }

        .mode-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: transparent;
            transition: background 0.4s var(--ease-cinematic);
        }

        .mode-card::after {
            content: "";
            position: absolute;
            inset: 0;
            border: 1px solid transparent;
            border-radius: 2px;
            transition: border-color 0.4s var(--ease-cinematic);
            pointer-events: none;
        }

        .mode-card:hover {
            transform: translateY(-3px) scale(1.01);
            border-color: rgba(0, 240, 255, 0.35);
            background: rgba(0, 240, 255, 0.04);
            box-shadow: 0 12px 40px rgba(0, 240, 255, 0.06);
        }

        .mode-card:hover::after {
            border-color: rgba(0, 240, 255, 0.15);
        }

        .mode-card.active {
            background:
                linear-gradient(145deg, rgba(0, 240, 255, 0.08), rgba(100, 50, 200, 0.06)),
                rgba(255, 255, 255, 0.03);
            border-color: var(--holo-cyan);
            box-shadow: inset 0 0 0 1px rgba(0, 240, 255, 0.15), 0 0 30px rgba(0, 240, 255, 0.08);
        }

        .mode-card.active::before {
            background: var(--holo-cyan);
            box-shadow: 0 0 12px var(--holo-cyan);
        }

        .mode-name {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .mode-copy {
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.4;
        }

        .run-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 14px;
            align-items: center;
            margin-top: 18px;
        }

        .verify-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.82rem;
            letter-spacing: 0.05em;
        }

        .verify-toggle input {
            width: 16px;
            height: 16px;
            accent-color: var(--holo-cyan);
            cursor: pointer;
        }

        .primary-button {
            min-width: 200px;
            height: 52px;
            border-radius: 2px;
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.15), rgba(100, 50, 200, 0.15));
            border: 1px solid var(--holo-cyan);
            color: var(--holo-cyan);
            cursor: pointer;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: transform 0.4s var(--ease-cinematic), background 0.4s var(--ease-cinematic), box-shadow 0.4s var(--ease-cinematic);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.03);
            position: relative;
            overflow: hidden;
        }

        .primary-button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.1), transparent);
            transition: left 0.6s var(--ease-cinematic);
        }

        .primary-button:hover:not(:disabled) {
            transform: translateY(-2px);
            background: rgba(0, 240, 255, 0.12);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2), inset 0 0 20px rgba(0, 240, 255, 0.05);
        }

        .primary-button:hover:not(:disabled)::before {
            left: 100%;
        }

        .primary-button:disabled {
            cursor: not-allowed;
            opacity: 0.4;
            border-color: var(--muted);
            color: var(--muted);
            box-shadow: none;
        }

        .message {
            margin-top: 12px;
            color: var(--hot);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .report-panel {
            min-height: 680px;
            overflow: hidden;
        }

        .report-head {
            padding: 24px;
            border-bottom: 1px solid var(--panel-border);
            background:
                linear-gradient(135deg, rgba(0, 240, 255, 0.04), rgba(100, 50, 200, 0.03)),
                repeating-linear-gradient(120deg, rgba(0, 240, 255, 0.02) 0 1px, transparent 1px 20px);
        }

        .report-title-row {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: flex-start;
        }

        .report-title {
            margin: 0;
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 2.6vw, 2.6rem);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .status-pill {
            flex: 0 0 auto;
            border-radius: 2px;
            border: 1px solid var(--panel-border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--amber);
            padding: 6px 14px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .progress-shell { margin-top: 20px; }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .progress-track {
            height: 6px;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.04);
            overflow: hidden;
            position: relative;
        }

        .progress-track::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(0, 240, 255, 0.06) 8px, rgba(0, 240, 255, 0.06) 9px);
        }

        .progress-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--holo-cyan), var(--amber));
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.35), 0 0 40px rgba(0, 240, 255, 0.1);
            transition: width 0.8s var(--ease-cinematic);
            position: relative;
        }

        .progress-fill::after {
            content: "";
            position: absolute;
            right: 0;
            top: -2px;
            bottom: -2px;
            width: 4px;
            background: var(--holo-cyan);
            box-shadow: 0 0 12px var(--holo-cyan), 0 0 24px var(--holo-cyan);
            animation: progressPulse 1.5s ease-in-out infinite;
        }

        @keyframes progressPulse {
            0%, 100% { opacity: 0.6; box-shadow: 0 0 8px var(--holo-cyan); }
            50% { opacity: 1; box-shadow: 0 0 20px var(--holo-cyan), 0 0 40px rgba(0, 240, 255, 0.3); }
        }

        /* ===== LIVE TELEMETRY ===== */
        .telemetry-feed {
            margin-top: 16px;
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background: rgba(0, 0, 0, 0.25);
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            line-height: 1.6;
            max-height: 120px;
            overflow: hidden;
            position: relative;
        }

        .telemetry-feed::before {
            content: ">>> LIVE TELEMETRY";
            display: block;
            color: var(--holo-cyan);
            letter-spacing: 0.15em;
            font-size: 0.65rem;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .telemetry-line {
            color: var(--muted);
            opacity: 0;
            transform: translateX(-8px);
            animation: telemetryIn 0.4s var(--ease-cinematic) forwards;
        }

        .telemetry-line.active { color: var(--holo-cyan); }
        .telemetry-line.done { color: var(--green); opacity: 0.5; }
        .telemetry-line.warn { color: var(--amber); }

        @keyframes telemetryIn {
            to { opacity: 1; transform: translateX(0); }
        }

        /* ===== SCAN SWEEP ===== */
        .scan-sweep {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .scan-sweep::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.03), transparent);
            animation: scanSweep 3s ease-in-out infinite;
        }

        @keyframes scanSweep {
            0% { left: -60%; }
            100% { left: 100%; }
        }

        /* ===== EVIDENCE ENTRANCE ===== */
        .evidence-card {

        .possibility strong {

        .error-box {
            border: 1px solid rgba(255, 90, 138, 0.3);

        /* Glitch text effect */
        .glitch {
            position: relative;

        .glitch::before, .glitch::after {
            content: attr(data-text);

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
        }

        @media (prefers-reduced-motion: no-preference) {
            .glitch:hover::before {
                animation: glitch1 0.3s ease-in-out;
                color: var(--holo-cyan);

                clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);

<body>
    <div class="aurora-layer"></div>
    <canvas id="void-canvas"></canvas>
    <div id="root"></div>
    <script>
        const h = React.createElement;
        const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";

        const MODES = [
            { id: "fast", name: "Rapid Scan", copy: "Low-intensity sweep for immediate situational awareness.", expected: "Fastest" },
            { id: "balanced", name: "Standard Survey", copy: "Moderate-depth analysis with verified source extraction.", expected: "Recommended" },
            { id: "deep", name: "Deep Probe", copy: "Maximum rigor. Full-spectrum verification and synthesis.", expected: "Most rigorous" },
        ];

        const PHASES = [
            { id: "phase_1", name: "Acquisition", copy: "Planning, scanning, collecting data fragments" },
            { id: "phase_2", name: "Verification", copy: "Cross-referencing selected signals" },
            { id: "phase_3", name: "Synthesis", copy: "Compiling the final intelligence brief" },
            { id: "phase_4", name: "Complete", copy: "Intel ready for review" },
        ];

        const COOK_LINES = [
            "Initiating deep space scan. Stand by for signal decryption.",
            "Processing interstellar data streams. Filtering noise from intelligence.",
            "Probe deployed. Harvesting fragments from the digital void.",
            "Calibrating sensors. The web is vast; we seek only the signal.",
            "Engaging acquisition arrays. Truth is buried in the noise."
        ];

        const WAIT_FACTS = [
            "The Voyager 1 probe carries a golden record with Earth's sounds — launched in 1977, it is now in interstellar space.",
            "Neutron stars can spin over 700 times per second. A sugar-cube of neutron star material weighs billions of tons.",
            "Tardigrades can survive the vacuum of space, extreme radiation, and temperatures near absolute zero.",
            "The Great Attractor is a gravitational anomaly pulling galaxies, including ours, toward an unseen mass.",
            "Saturn's moon Titan has liquid methane lakes and a thick nitrogen atmosphere — a world of cold hydrocarbons.",
            "The Wow! Signal, detected in 1977, remains the strongest candidate for an extraterrestrial radio transmission.",
            "There are more possible iterations of a game of chess than atoms in the observable universe.",
            "Dark matter makes up ~27% of the universe, yet we cannot see it — only its gravitational shadow."
        ];

        const LIVE_RESEARCH_NOTE = "Live telemetry: a final report cannot be instant because the probe is actively scanning live networks, extracting source fragments, verifying signals, and cross-referencing intelligence in real time.";

        const HISTORY_KEY = "xenoCoreMissionLog";

        /* ===== CANVAS BACKGROUND ===== */
        function initVoidCanvas() {
            const canvas = document.getElementById("void-canvas");
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            let particles = [];
            let width, height;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener("resize", resize);

            const PARTICLE_COUNT = 140;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.25,
                    vy: (Math.random() - 0.5) * 0.25,
                    size: Math.random() * 1.5 + 0.5,
                    alpha: Math.random() * 0.5 + 0.1,
                    pulse: Math.random() * Math.PI * 2,
                    color: Math.random() > 0.7 ? [0, 240, 255] : [100, 50, 200]
                });
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                for (let p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.pulse += 0.015;
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;
                    const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${a})`;
                    ctx.fill();
                }
                ctx.strokeStyle = "rgba(0, 240, 255, 0.025)";
                ctx.lineWidth = 0.5;
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 130) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }
            draw();
        }

        /* ===== SCROLL REVEAL HOOK ===== */
        function useScrollReveal() {
            React.useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add("visible");
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

                document.querySelectorAll(".reveal, .section-divider").forEach(el => observer.observe(el));
                return () => observer.disconnect();
            }, []);
        }

        function phaseState(phaseId, session) {
            if (!session) return "";
            if (session.status === "completed") return "done";
            const currentIndex = PHASES.findIndex(item => item.id === session.phase);
            const phaseIndex = PHASES.findIndex(item => item.id === phaseId);
            if (phaseIndex < currentIndex) return "done";
            if (phaseIndex === currentIndex) return "active";
            return "";
        }

        function getProgress(session, depth) {
            if (!session) return { value: 0, label: "Awaiting directive" };
            if (session.status === "completed") return { value: 100, label: "Transmission complete" };
            if (session.status === "failed") return { value: 100, label: "Signal lost" };
            const phase1 = session.progress && session.progress.phase_1 ? session.progress.phase_1 : {};
            const phase2 = session.progress && session.progress.phase_2 ? session.progress.phase_2 : {};
            const evidenceCount = session.evidence_count || 0;
            const iterations = phase1.iterations || 0;
            const researchPart = Math.min(45, Math.round((iterations / Math.max(depth, 1)) * 45));
            if (session.phase === "phase_1") {
                const bonus = evidenceCount > 0 ? 10 : 0;
                return { value: Math.min(55, 8 + researchPart + bonus), label: "Acquiring fragments" };
            }
            if (session.phase === "phase_2") {
                const verified = phase2.claims_verified || 0;
                const verifyPart = Math.min(25, Math.round((verified / Math.max(evidenceCount, 1)) * 25));
                return { value: Math.min(80, 55 + verifyPart), label: "Verifying signals" };
            }
            if (session.phase === "phase_3") return { value: 88, label: "Synthesizing intel" };
            if (session.phase === "phase_4") return { value: 96, label: "Finalizing transmission" };
            return { value: 5, label: "Initializing" };
        }

            if (!session) return "Standby";

                planning: "Planning",
                executing: "Scanning",
                verifying: "Verifying",
                generating: "Synthesizing",
                completed: "Complete",
                failed: "Failed",
            };
            return labels[session.status] || session.status;

        function TelemetryFeed({ session, evidence }) {

            React.useEffect(() => {
                if (!session) return;
                const newLines = [];
                const phase = session.phase || "";
                const status = session.status || "";
                const evCount = evidence.length;

                if (status === "planning" || status === "executing") {
                    newLines.push({ text: `Phase: ${phase.replace("phase_", "")} | Status: ${status}`, type: "active" });
                }
                if (evCount > prevEvidenceCount.current) {
                    newLines.push({ text: `Fragment acquired [${evCount}]`, type: "done" });
                }
                if (phase === "phase_2" && prevPhase.current === "phase_1") {
                    newLines.push({ text: "Verification sequence initiated", type: "warn" });
                }
                if (phase === "phase_3" && prevPhase.current === "phase_2") {
                    newLines.push({ text: "Synthesis matrix engaged", type: "active" });
                }

                prevPhase.current = phase;
                prevEvidenceCount.current = evCount;

                if (newLines.length > 0) {
                    setLines(prev => [...prev.slice(-4), ...newLines]);
                }
            }, [session, evidence.length]);

            if (lines.length === 0) {
                return h("div", { className: "telemetry-feed" },

        function pickForSession(items, session, salt) {
            const seed = [
                session && session.session_id ? session.session_id : "ready",
                session && session.phase ? session.phase : "phase",
                session && session.evidence_count ? session.evidence_count : 0,
                salt
            ].join("-");
            let total = 0;
            for (let index = 0; index < seed.length; index += 1) {
                total += seed.charCodeAt(index);
            }
            return items[total % items.length];

                    h("div", { className: "visual-kicker" }, `Array ${index + 1}`),
                    h("div", { className: "visual-title" }, card.title),
                    h("div", { className: "visual-copy" }, card.copy)
                ))
            );
        }

        function buildVisualCaptions(topic, evidence) {
            const cleanClaims = evidence
                .map(item => item.claim || "")
                .filter(Boolean)
                .slice(0, 3);
            return [
                {
                    title: "Primary Signal",
                    copy: cleanClaims[0]
                        ? shorten(cleanClaims[0], 150)
                        : `${topic} is the target object. The probe is collecting telemetry to map its structure.`
                },
                {
                    title: "Key Variable",
                    copy: cleanClaims[1]
                        ? shorten(cleanClaims[1], 150)
                        : "Watch for forces, entities, events, or patterns that govern the target's behavior."
                },
                {
                    title: "Strategic Value",
                    copy: cleanClaims[2]
                        ? shorten(cleanClaims[2], 150)
                        : "The final brief converts raw fragments into structured intelligence with provenance."
                }
            ];
        }

        function shorten(text, max) {
            if (text.length <= max) return text;
            return `${text.slice(0, max).replace(/\s+\S*$/, "")}...`;
        }

        async function loadReport(sessionId, setReport, setMessage) {
            try {
                const response = await fetch(`${API_BASE}/api/research/${sessionId}/report-text`);
                if (!response.ok) throw new Error("Report synthesized, but could not be loaded.");
                const data = await response.json();
                setReport((data.content || "").trim());
            } catch (error) {
                setMessage(error.message);
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
</body>
</html>
