            .tab-slider { display: none; }
            .report-body { padding: 16px; max-height: none; }
            .report-head { padding: 16px; }
            .side-panel { padding: 16px; }
            .empty-state { min-height: 300px; }
            .cook-card { padding: 20px; }
            .visual-grid { grid-template-columns: 1fr; }
            .visual-card { min-height: 240px; }
            .telemetry-feed { padding: 10px 12px; font-size: 0.7rem; }
            .footer { padding: 24px 0 16px; font-size: 0.65rem; }
            input[type="text"].search-input { height: 48px; font-size: 1rem; }
            .footer-name { font-size: 1rem; letter-spacing: 0.15em; }
        }
    </style>
</head>
<body>
    <div class="aurora-layer"></div>
    <canvas id="void-canvas"></canvas>
    <div id="root"></div>
    <script>
        const h = React.createElement;
        const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";

        const MODES = [
            { id: "fast", name: "Quick Run", copy: "Fast, surface-level overview for when you need a quick read.", expected: "Fastest" },
            { id: "balanced", name: "Balanced", copy: "Moderate depth with source verification.", expected: "Recommended" },
            { id: "deep", name: "Deep Dive", copy: "Maximum depth. Full verification and detailed reporting.", expected: "Most rigorous" },
        ];

        const PHASES = [
            { id: "phase_1", name: "Research", copy: "Planning, searching, and collecting sources" },
            { id: "phase_2", name: "Verification", copy: "Cross-referencing selected claims" },
            { id: "phase_3", name: "Report", copy: "Compiling the final report" },
            { id: "phase_4", name: "Complete", copy: "Ready for review" },
        ];

        const COOK_LINES = [
            "Starting research. Pulling live sources.",
            "Processing search results. Filtering signal from noise.",
            "Agents deployed. Harvesting sources from the web.",
            "Calibrating queries. The web is vast; we seek only relevant signal.",
            "Running search queries. Truth is buried in the noise."
        ];

        const WAIT_FACTS = [
            "The first computer bug was an actual moth found in a Harvard Mark II relay in 1947.",
            "The first 1KB of RAM cost more than a house in 1957. Today, a terabyte costs less than dinner.",
            "TCP/IP was designed to survive a nuclear attack. The protocol is so robust it now runs on Mars rovers.",
            "Git was created by Linus Torvalds in 2005 to manage the Linux kernel. It took him about two weeks to build.",
            "The Apollo Guidance Computer had 4KB of RAM and ran at 0.043 MHz. Your phone is roughly a million times faster.",
            "The first message sent over ARPANET was supposed to be 'LOGIN' but the system crashed after 'LO'.",
            "There are more possible unique Git commit hashes (2^160) than atoms in a glass of water.",
            "About 95% of the code in a modern production codebase is open-source dependencies you never audited."
        ];

        const LIVE_RESEARCH_NOTE = "Live status: a final report takes time because the agent is actively searching the web, extracting sources, verifying claims, and cross-referencing results in real time.";

        const HISTORY_KEY = "researchAgentHistory";

        /* ===== CANVAS BACKGROUND ===== */
        function initVoidCanvas() {
            const canvas = document.getElementById("void-canvas");
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            let width, height, dpr;
            const isMobile = window.matchMedia("(pointer: coarse)").matches;

            function resize() {
                dpr = Math.min(window.devicePixelRatio || 1, isMobile ? 1.5 : 2);
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                canvas.style.width = width + "px";
                canvas.style.height = height + "px";
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            resize();
            window.addEventListener("resize", resize);

            /* Star field — fewer on mobile */
            let stars = [];
            const STAR_COUNT = isMobile ? 50 : 90;
            for (let i = 0; i < STAR_COUNT; i++) {
                const t = Math.random();
                let color;
                if (t < 0.05) color = [0, 240, 255];
                else if (t < 0.15) color = [180, 200, 255];
                else if (t < 0.25) color = [255, 220, 180];
                else color = [200, 200, 220];
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.3 + 0.2,
                    alpha: Math.random() * 0.5 + 0.1,
                    pulseSpeed: Math.random() * 0.015 + 0.003,
                    pulseOffset: Math.random() * Math.PI * 2,
                    color
                });
            }

            /* Galaxies — fewer particles on mobile */
            let galaxies = [
                { x: width * 0.12, y: height * 0.3, size: 140, rotation: 0.4, rotSpeed: 0.00015, hue: 195, tilt: 0.35, arms: 3 },
                { x: width * 0.88, y: height * 0.7, size: 110, rotation: 2.1, rotSpeed: -0.0002, hue: 265, tilt: 0.55, arms: 2 },
                { x: width * 0.5, y: height * 0.85, size: 80, rotation: 1.0, rotSpeed: 0.00025, hue: 320, tilt: 0.7, arms: 2 }
            ];
            const GALAXY_ARM_STEPS = isMobile ? 18 : 28;

            function drawGalaxy(g, time) {
                g.rotation += g.rotSpeed;
                ctx.save();
                ctx.translate(g.x, g.y);
                ctx.rotate(g.rotation);
                ctx.scale(1, g.tilt);

                /* Bright core */
                const core = ctx.createRadialGradient(0, 0, 0, 0, 0, g.size * 0.4);
                core.addColorStop(0, `hsla(${g.hue}, 50%, 85%, 0.25)`);
                core.addColorStop(0.5, `hsla(${g.hue}, 45%, 60%, 0.12)`);
                core.addColorStop(1, `hsla(${g.hue}, 40%, 40%, 0)`);
                ctx.fillStyle = core;
                ctx.beginPath();
                ctx.arc(0, 0, g.size * 0.4, 0, Math.PI * 2);
                ctx.fill();

                /* Outer halo */
                const halo = ctx.createRadialGradient(0, 0, g.size * 0.3, 0, 0, g.size);
                halo.addColorStop(0, `hsla(${g.hue}, 35%, 50%, 0.08)`);
                halo.addColorStop(1, `hsla(${g.hue}, 30%, 30%, 0)`);
                ctx.fillStyle = halo;
                ctx.beginPath();
                ctx.ellipse(0, 0, g.size, g.size * 0.65, 0, 0, Math.PI * 2);
                ctx.fill();

                /* Spiral arms with bright knots */
                for (let arm = 0; arm < g.arms; arm++) {
                    const offset = arm * (Math.PI * 2 / g.arms);
                    for (let s = 3; s < GALAXY_ARM_STEPS; s++) {
                        const a = offset + s * 0.18;
                        const d = s * (g.size / 32);
                        const px = Math.cos(a) * d;
                        const py = Math.sin(a) * d * 0.5;
                        const progress = 1 - s / GALAXY_ARM_STEPS;
                        const sz = progress * 2.5;
                        const brightness = progress * 0.18;
                        ctx.beginPath();
                        ctx.arc(px, py, sz, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${g.hue + s * 2}, 55%, 75%, ${brightness})`;
                        ctx.fill();
                        /* Bright knots */
                        if (s % 7 === 0) {
                            ctx.beginPath();
                            ctx.arc(px, py, sz * 1.8, 0, Math.PI * 2);
                            ctx.fillStyle = `hsla(${g.hue + 20}, 60%, 80%, ${brightness * 0.6})`;
                            ctx.fill();
                        }
                    }
                }
                ctx.restore();
            }

            function drawBlackHole(bh, time) {
                bh.rot += 0.012;
                const flicker = 0.8 + 0.2 * Math.sin(time * 0.0012);
                const x = bh.x, y = bh.y, s = bh.size;

                /* Gravitational lensing glow (large) */
                const lens = ctx.createRadialGradient(x, y, s, x, y, s * 10);
                lens.addColorStop(0, `rgba(0, 0, 0, 0.98)`);
                lens.addColorStop(0.08, `rgba(20, 10, 40, ${0.25 * flicker})`);
                lens.addColorStop(0.2, `rgba(80, 40, 140, ${0.12 * flicker})`);
                lens.addColorStop(0.35, `rgba(0, 240, 255, ${0.06 * flicker})`);
                lens.addColorStop(0.6, `rgba(60, 30, 100, ${0.02 * flicker})`);
                lens.addColorStop(1, `rgba(0, 0, 0, 0)`);
                ctx.fillStyle = lens;
                ctx.fillRect(x - s * 10, y - s * 10, s * 20, s * 20);

                /* Main accretion disk */
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(bh.rot);
                ctx.scale(1, 0.22);

                /* Disk body */
                const diskBody = ctx.createRadialGradient(0, 0, s * 0.9, 0, 0, s * 3.5);
                diskBody.addColorStop(0, `rgba(0, 0, 0, 0)`);
                diskBody.addColorStop(0.25, `rgba(0, 240, 255, ${0.35 * flicker})`);
                diskBody.addColorStop(0.5, `rgba(140, 60, 255, ${0.25 * flicker})`);
                diskBody.addColorStop(0.75, `rgba(255, 100, 80, ${0.12 * flicker})`);
                diskBody.addColorStop(1, `rgba(0, 0, 0, 0)`);
                ctx.fillStyle = diskBody;
                ctx.beginPath();
                ctx.arc(0, 0, s * 3.5, 0, Math.PI * 2);
                ctx.fill();

                /* Inner bright ring */
                const innerRing = ctx.createRadialGradient(0, 0, s * 0.8, 0, 0, s * 1.6);
                innerRing.addColorStop(0, `rgba(0, 0, 0, 0)`);
                innerRing.addColorStop(0.5, `rgba(200, 240, 255, ${0.5 * flicker})`);
                innerRing.addColorStop(1, `rgba(0, 0, 0, 0)`);
                ctx.fillStyle = innerRing;
                ctx.beginPath();
                ctx.arc(0, 0, s * 1.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                /* Shadow body (black sphere) */
                ctx.beginPath();
                ctx.arc(x, y, s * 0.85, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(0, 0, 0, 0.95)";
                ctx.fill();

                /* Photon ring (thin bright edge) */
                ctx.beginPath();
                ctx.arc(x, y, s * 0.9, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(180, 240, 255, ${0.6 * flicker})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();

                /* Doppler bright spot (approaching side) */
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(bh.rot);
                ctx.scale(1, 0.22);
                const bright = ctx.createRadialGradient(s * 1.2, 0, 0, 0, 0, s * 2);
                bright.addColorStop(0, `rgba(255, 255, 255, ${0.3 * flicker})`);
                bright.addColorStop(1, `rgba(0, 0, 0, 0)`);
                ctx.fillStyle = bright;
                ctx.beginPath();
                ctx.arc(0, 0, s * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            /* Build a simple spatial grid so constellation lines are O(n) instead of O(n²) */
            function drawConstellationLines() {
                const cellSize = 120;
                const cols = Math.ceil(width / cellSize);
                const grid = new Map();
                for (let i = 0; i < stars.length; i++) {
                    const s = stars[i];
                    const cx = Math.floor(s.x / cellSize);
                    const cy = Math.floor(s.y / cellSize);
                    const key = cx + "," + cy;
                    if (!grid.has(key)) grid.set(key, []);
                    grid.get(key).push(i);
                }
                ctx.strokeStyle = "rgba(200, 210, 255, 0.012)";
                ctx.lineWidth = 0.5;
                const drawn = new Set();
                for (let i = 0; i < stars.length; i++) {
                    const s = stars[i];
                    const cx = Math.floor(s.x / cellSize);
                    const cy = Math.floor(s.y / cellSize);
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = -1; dy <= 1; dy++) {
                            const key = (cx + dx) + "," + (cy + dy);
                            const neighbors = grid.get(key);
                            if (!neighbors) continue;
                            for (let j of neighbors) {
                                if (j <= i) continue;
                                const pair = i + "-" + j;
                                if (drawn.has(pair)) continue;
                                const dist = Math.hypot(s.x - stars[j].x, s.y - stars[j].y);
                                if (dist < 110) {
                                    ctx.beginPath();
                                    ctx.moveTo(s.x, s.y);
                                    ctx.lineTo(stars[j].x, stars[j].y);
                                    ctx.stroke();
                                    drawn.add(pair);
                                }
                            }
                        }
                    }
                }
            }

            let running = true;
            document.addEventListener("visibilitychange", () => {
                running = !document.hidden;
                if (running) draw();
            });

            function draw() {
                if (!running) return;
                const time = Date.now();
                ctx.clearRect(0, 0, width, height);

                /* Galaxies (behind stars) */
                for (let g of galaxies) {
                    drawGalaxy(g, time);
                }

                /* Stars */
                for (let s of stars) {
                    const pulse = 0.75 + 0.25 * Math.sin(time * s.pulseSpeed + s.pulseOffset);
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${s.color[0]}, ${s.color[1]}, ${s.color[2]}, ${s.alpha * pulse})`;
                    ctx.fill();
                }

                drawConstellationLines();
                requestAnimationFrame(draw);
            }
            draw();
        }

        /* ===== SCROLL REVEAL HOOK ===== */
        function useScrollReveal() {
            React.useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add("visible");
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

                document.querySelectorAll(".reveal, .section-divider").forEach(el => observer.observe(el));
                return () => observer.disconnect();
            }, []);
        }

        /* ===== APP COMPONENT ===== */
        function App() {
            const [topic, setTopic] = React.useState("");
            const [depth, setDepth] = React.useState(1);
            const [mode, setMode] = React.useState("fast");
            const [verify, setVerify] = React.useState(false);
            const [model, setModel] = React.useState("deepseek/deepseek-v4-flash");
            const [sessionId, setSessionId] = React.useState(null);
            const [session, setSession] = React.useState(null);
            const [report, setReport] = React.useState("");
            const [view, setView] = React.useState("report");
            const [message, setMessage] = React.useState("");
            const [loading, setLoading] = React.useState(false);
            const [history, setHistory] = React.useState(loadHistory);
            const loadedReportPath = React.useRef("");
            const tabsRef = React.useRef(null);
            const [sliderStyle, setSliderStyle] = React.useState({ left: 0, width: 0 });

            React.useEffect(() => { initVoidCanvas(); }, []);
            useScrollReveal();

            React.useEffect(() => {
                if (mode === "fast") {
                    setDepth(1);
                    setVerify(false);
                    setModel("deepseek/deepseek-v4-flash");
                } else if (mode === "balanced") {
                    setDepth(previous => Math.max(previous, 2));
                    setModel("deepseek/deepseek-v4-flash");
                } else {
                    setDepth(previous => Math.max(previous, 3));
                    setVerify(true);
                    setModel("deepseek/deepseek-v4-pro");
                }
            }, [mode]);

            React.useEffect(() => {
                if (!sessionId) return;
                let cancelled = false;
                let timeoutId = null;
                const poll = async () => {
                    try {
                        const response = await fetch(`${API_BASE}/api/research/${sessionId}`);
                        if (!response.ok) throw new Error("Could not load session status");
                        const data = await response.json();
                        if (cancelled) return;
                        setSession(data);
                        const reportPath = data.progress && data.progress.phase_3
                            ? data.progress.phase_3.report_path
                            : "";
                        if (reportPath && reportPath !== loadedReportPath.current) {
                            await loadReport(sessionId, setReport, setMessage);
                            loadedReportPath.current = reportPath;
                        }
                        if (data.status === "completed" || data.status === "failed") {
                            if (data.status === "failed") setReport("");
                            return;
                        }
                    } catch (error) {
                        if (!cancelled) setMessage(error.message);
                    }
                    if (!cancelled) {
                        timeoutId = window.setTimeout(poll, 2000);
                    }
                };
                poll();
                return () => { cancelled = true; if (timeoutId) clearTimeout(timeoutId); };
            }, [sessionId]);

            React.useEffect(() => {
                if (!tabsRef.current) return;
                const activeTab = tabsRef.current.querySelector('.tab.active');
                if (activeTab) {
                    setSliderStyle({
                        left: activeTab.offsetLeft,
                        width: activeTab.offsetWidth
                    });
                }
            }, [view]);

            const startResearch = async () => {
                const cleanTopic = topic.trim();
                if (!cleanTopic) {
                    setMessage("Enter a research topic first.");
                    return;
                }
                setLoading(true);
                setMessage("");
                setReport("");
                loadedReportPath.current = "";
                setSession(null);
                setView("report");
                const nextHistory = rememberSearch(history, {
                    topic: cleanTopic, mode, depth, model, verify,
                    createdAt: new Date().toISOString()
                });
                setHistory(nextHistory);
                try {
                    const response = await fetch(`${API_BASE}/api/research/start`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ topic: cleanTopic, depth, verify, model, mode }),
                    });
                    if (!response.ok) {
                        const text = await response.text();
                        throw new Error(text || "Could not start research");
                    }
                    const data = await response.json();
                    setSessionId(data.session_id);
                } catch (error) {
                    setMessage(error.message || "Failed to start research");
                } finally {
                    setLoading(false);
                }
            };

            const progress = getProgress(session, depth);
            const evidence = session && session.evidence_bank ? session.evidence_bank : [];
            const errors = session && session.errors ? session.errors : [];
            const activeMode = MODES.find(item => item.id === mode) || MODES[0];
            const replaySearch = item => {
                setTopic(item.topic);
                setMode(item.mode || "fast");
                setDepth(item.depth || 1);
                setModel(item.model || "deepseek/deepseek-v4-flash");
                setVerify(Boolean(item.verify));
            };
            const clearHistory = () => {
                localStorage.removeItem(HISTORY_KEY);
                setHistory([]);
            };

            return h("main", { className: "app" },
                h(HeroSection, { onScrollToWorkbench: () => {
                    document.getElementById("workbench")?.scrollIntoView({ behavior: "smooth" });
                }}),
                h(SectionDivider, { text: "Workbench" }),
                h("section", { id: "workbench", className: "workbench" },
                    h("div", null,
                        h("section", { className: "control-panel panel reveal reveal-delay-1" },
                            h("div", { className: "search-prompt" }, "Start Here"),
                            h("div", { className: "control-grid" },
                                field("Research Topic",
                                    h("input", {
                                        type: "text",
                                        className: "search-input",
                                        value: topic,
                                        onChange: event => setTopic(event.target.value),
                                        onKeyDown: event => { if (event.key === "Enter") startResearch(); },
                                        placeholder: "exoplanets, quantum biology, ancient civilizations..."
                                    })
                                ),
                                field("Research Depth",
                                    h("div", { className: `select-shell ${mode === "fast" ? "disabled" : ""}` },
                                        h("select", {
                                            value: depth,
                                            onChange: event => setDepth(Number(event.target.value)),
                                            disabled: mode === "fast"
                                        },
                                            h("option", { value: 1 }, "Surface (1)"),
                                            h("option", { value: 2 }, "Shallow (2)"),
                                            h("option", { value: 3 }, "Standard (3)"),
                                            h("option", { value: 5 }, "Deep (5)")
                                        )
                                    )
                                ),
                                field("Model",
                                    h("div", { className: "select-shell" },
                                        h("select", {
                                            value: model,
                                            onChange: event => setModel(event.target.value)
                                        },
                                            h("option", { value: "deepseek/deepseek-v4-flash" }, "DeepSeek V4 Flash"),
                                            h("option", { value: "deepseek/deepseek-v4-pro" }, "DeepSeek V4 Pro")
                                        )
                                    )
                                )
                            ),
                            h("div", { className: "mode-grid" },
                                MODES.map(item => h("button", {
                                    key: item.id,
                                    type: "button",
                                    className: `mode-card ${mode === item.id ? "active" : ""}`,
                                    onClick: () => setMode(item.id)
                                },
                                    h("div", { className: "mode-name" }, item.name),
                                    h("div", { className: "mode-copy" }, item.copy)
                                ))
                            ),
                            h("div", { className: "run-row" },
                                h("label", { className: "verify-toggle" },
                                    h("input", {
                                        type: "checkbox",
                                        checked: verify,
                                        disabled: mode === "fast",
                                        onChange: event => setVerify(event.target.checked)
                                    }),
                                    "Cross-reference source integrity"
                                ),
                                h("button", {
                                    className: "primary-button",
                                    type: "button",
                                    disabled: loading,
                                    onClick: startResearch
                                }, loading ? "Initializing..." : "Start Research")
                            ),
                            message ? h("div", { className: "message" }, message) : null
                        ),
                        h("article", { className: "report-panel panel reveal reveal-delay-2" },
                            h("div", { className: "report-head" },
                                h("div", { className: "report-title-row" },
                                    h("div", null,
                                        h("h2", { className: "report-title" }, session ? session.topic : "No Active Research"),
                                        h("div", { className: "phase-copy" }, `${activeMode.name} \u2014 ${activeMode.expected}`)
                                    ),
                                    h("div", { className: `status-pill ${session && session.status !== "completed" && session.status !== "failed" ? "pulse" : ""}` }, statusLabel(session))
                                ),
                                h("div", { className: "progress-shell" },
                                    h("div", { className: "progress-meta" },
                                        h("span", null, progress.label),
                                        h("strong", null, `${progress.value}%`)
                                    ),
                                    h("div", { className: "progress-track" },
                                        h("div", { className: "progress-fill", style: { width: `${progress.value}%` } })
                                    ),
                                    session && session.status !== "completed" && session.status !== "failed"
                                        ? h(TelemetryFeed, { session, evidence })
                                        : null
                                )
                            ),
                            h("div", { className: "view-tabs", ref: tabsRef },
                                tabButton("report", "Report", view, setView),
                                tabButton("visuals", "Analysis", view, setView),
                                tabButton("evidence", `Sources (${evidence.length})`, view, setView),
                                h("div", { className: "tab-slider", style: sliderStyle })
                            ),
                            h("div", { className: "report-body" },
                                renderMainContent({ session, report, view, evidence, errors })
                            )
                        )
                    ),
                    h("aside", { className: "side-panel panel reveal reveal-delay-3" },
                        h("h3", { className: "side-title" }, "Status"),
                        h("div", { className: "phase-list" },
                            PHASES.map((phase, index) => h(PhaseItem, {
                                key: phase.id,
                                phase,
                                index,
                                session
                            }))
                        ),
                        h("div", { className: "stat-grid" },
                            h("div", { className: "stat" },
                                h("div", { className: "stat-value" }, evidence.length),
                                h("div", { className: "stat-label" }, "Sources")
                            ),
                            h("div", { className: "stat" },
                                h("div", { className: "stat-value" }, depth),
                                h("div", { className: "stat-label" }, "Depth")
                            )
                        ),
                        h("div", { className: "possibilities" },
                            h("h3", { className: "side-title" }, "How it works"),
                            h("p", { className: "possibility" },
                                h("strong", null, "Evidence-first: "),
                                "the agent preserves raw sources and citations instead of generating opaque summaries."
                            ),
                            h("p", { className: "possibility" },
                                h("strong", null, "Depth modes: "),
                                "select research intensity based on your time constraints."
                            ),
                            h("p", { className: "possibility" },
                                h("strong", null, "Traceable output: "),
                                "all reports, sources, and search history remain in the archive for review."
                            )
                        ),
                        h("div", { className: "history-panel" },
                            h("h3", { className: "side-title" }, "History"),
                            history.length
                                ? h("div", { className: "history-list" },
                                    history.map(item => h("button", {
                                        key: `${item.topic}-${item.createdAt}`,
                                        type: "button",
                                        className: "history-button",
                                        onClick: () => replaySearch(item)
                                    },
                                        h("span", { className: "history-topic" }, item.topic),
                                        h("span", { className: "history-meta" }, `${modeName(item.mode)} \u2014 ${new Date(item.createdAt).toLocaleDateString()}`)
                                    )),
                                    h("button", { type: "button", className: "clear-history", onClick: clearHistory }, "Clear history")
                                )
                                : h("p", { className: "possibility" }, "Past searches will appear here.")
                        )
                    )
                ),
                h(Footer)
            );
        }

        function Footer() {
            return h("footer", { className: "footer" },
                h("div", { className: "footer-signature" },
                    h("div", { className: "footer-sparkles" },
                        h("span", { className: "footer-sparkle" }),
                        h("span", { className: "footer-sparkle" }),
                        h("span", { className: "footer-sparkle" }),
                        h("span", { className: "footer-sparkle" }),
                        h("span", { className: "footer-sparkle" })
                    ),
                    h("span", { className: "footer-label" }, "Crafted by"),
                    h("span", { className: "footer-name" }, "Uday Reddy"),
                    h("div", { className: "footer-glow-line" })
                )
            );
        }

        function HeroSection({ onScrollToWorkbench }) {
            const [typed, setTyped] = React.useState("");
            const fullText = "THE LAST SEARCH ENGINE YOU WILL EVER NEED";
            React.useEffect(() => {
                let i = 0;
                const interval = setInterval(() => {
                    setTyped(fullText.slice(0, i + 1));
                    i++;
                    if (i >= fullText.length) clearInterval(interval);
                }, 40);
                return () => clearInterval(interval);
            }, []);

            return h("section", { className: "hero" },
                h("div", { className: "hero-content" },
                    h("div", { className: "hero-glyph" }, "// Autonomous Research Agent //"),
                    h("h1", null,
                        h("span", { className: "hero-line glitch hero-entrance hero-entrance-delay-1", "data-text": "AUTONOMOUS" }, "AUTONOMOUS"),
                        h("span", { className: "hero-line hero-accent glitch hero-entrance hero-entrance-delay-2", "data-text": "RESEARCH" }, "RESEARCH"),
                        h("span", { className: "hero-line hero-accent glitch hero-entrance hero-entrance-delay-3", "data-text": "AGENT" }, "AGENT")
                    ),
                    h("div", { className: "hero-sub" }, typed, h("span", { style: { opacity: 0.6 } }, "\u2588")),
                    h("div", { className: "hero-divider" }),
                    h("p", { className: "hero-desc" },
                        "It scours the live web, pulls verified sources, and builds traceable research reports \u2014 so you get answers with receipts, not guesses."
                    )
                ),
                h("button", {
                    className: "scroll-indicator",
                    onClick: onScrollToWorkbench,
                    style: { background: "none", border: "none" }
                },
                    h("span", null, "Get Started"),
                    h("svg", { viewBox: "0 0 24 24" },
                        h("path", { d: "M12 5v14M5 12l7 7 7-7" })
                    )
                )
            );
        }

        function SectionDivider({ text }) {
            return h("div", { className: "section-divider reveal" },
                h("div", { className: "divider-line" }),
                h("div", { className: "hex-icon" }),
                text,
                h("div", { className: "hex-icon" }),
                h("div", { className: "divider-line" })
            );
        }

        function field(label, control) {
            return h("div", null, h("label", null, label), control);
        }

        function loadHistory() {
            try {
                const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
                return Array.isArray(parsed) ? parsed.slice(0, 8) : [];
            } catch { return []; }
        }

        function rememberSearch(history, entry) {
            const deduped = history.filter(item => item.topic.toLowerCase() !== entry.topic.toLowerCase());
            const next = [entry, ...deduped].slice(0, 8);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(next));
            return next;
        }

        function modeName(mode) {
            const found = MODES.find(item => item.id === mode);
            return found ? found.name : "Quick Run";
        }

        function tabButton(id, label, view, setView) {
            return h("button", {
                className: `tab ${view === id ? "active" : ""}`,
                type: "button",
                onClick: () => setView(id)
            }, label);
        }

        function PhaseItem({ phase, index, session }) {
            const state = phaseState(phase.id, session);
            return h("div", { className: `phase-item ${state}` },
                h("div", { className: "phase-dot" }, state === "done" ? "OK" : index + 1),
                h("div", null,
                    h("div", { className: "phase-name" }, phase.name),
                    h("div", { className: "phase-copy" }, phase.copy)
                )
            );
        }

        function phaseState(phaseId, session) {
            if (!session) return "";
            if (session.status === "completed") return "done";
            const currentIndex = PHASES.findIndex(item => item.id === session.phase);
            const phaseIndex = PHASES.findIndex(item => item.id === phaseId);
            if (phaseIndex < currentIndex) return "done";
            if (phaseIndex === currentIndex) return "active";
            return "";
        }

        function getProgress(session, depth) {
            if (!session) return { value: 0, label: "Awaiting topic" };
            if (session.status === "completed") return { value: 100, label: "Research complete" };
            if (session.status === "failed") return { value: 100, label: "Research failed" };
            const phase1 = session.progress && session.progress.phase_1 ? session.progress.phase_1 : {};
            const phase2 = session.progress && session.progress.phase_2 ? session.progress.phase_2 : {};
            const evidenceCount = session.evidence_count || 0;
            const iterations = phase1.iterations || 0;
            const researchPart = Math.min(45, Math.round((iterations / Math.max(depth, 1)) * 45));
            if (session.phase === "phase_1") {
                const bonus = evidenceCount > 0 ? 10 : 0;
                return { value: Math.min(55, 8 + researchPart + bonus), label: "Collecting sources" };
            }
            if (session.phase === "phase_2") {
                const verified = phase2.claims_verified || 0;
                const verifyPart = Math.min(25, Math.round((verified / Math.max(evidenceCount, 1)) * 25));
                return { value: Math.min(80, 55 + verifyPart), label: "Verifying sources" };
            }
            if (session.phase === "phase_3") return { value: 88, label: "Writing report" };
            if (session.phase === "phase_4") return { value: 96, label: "Finalizing" };
            return { value: 5, label: "Initializing" };
        }

        function statusLabel(session) {
            if (!session) return "Standby";
            const labels = {
                planning: "Planning",
                executing: "Researching",
                verifying: "Verifying",
                generating: "Writing",
                completed: "Complete",
                failed: "Failed",
            };
            return labels[session.status] || session.status;
        }

        function renderMainContent({ session, report, view, evidence, errors }) {
            if (session && session.status === "failed") {
                return h("div", { className: "error-box" },
                    errors.length ? errors.join(" ") : "The research failed before a report could be generated."
                );
            }
            if (view === "visuals") return renderVisualGuide(session, evidence);
            if (view === "evidence") {
                if (!evidence.length) {
                    return h("div", { className: "empty-state" },
                        h("div", null,
                            h("strong", null, "Awaiting Sources"),
                            h("span", null, "Sources will stream in as the agent works.")
                        )
                    );
                }
                return h("div", { className: "evidence-list" },
                    evidence.map(item => h("div", { className: "evidence-card", key: item.claim_id || `${item.source_url}-${item.claim}` },
                        h("strong", null, item.claim),
                        h("div", { className: "source" }, item.source_url),
                        h("div", { className: "confidence" }, `Confidence: ${item.confidence || "unknown"}`)
                    ))
                );
            }
            if (report) {
                const html = window.marked && marked.parse
                    ? marked.parse(report)
                    : `<pre>${escapeHtml(report)}</pre>`;
                return h("div", null,
                    renderDraftBanner(session),
                    h("div", { className: "markdown", dangerouslySetInnerHTML: { __html: html } })
                );
            }
            if (session && session.status !== "completed") {
                return renderCookingState(session, evidence);
            }
            return h("div", { className: "empty-state" },
                h("div", null,
                    h("strong", null, "Awaiting Topic"),
                    h("span", null, "Enter a topic to start research.")
                )
            );
        }

        function renderDraftBanner(session) {
            if (!isInstantDraft(session) || session.status === "completed") return null;
            const mood = pickForSession(COOK_LINES, session, 1);
            return h("div", { className: "draft-banner" },
                h("div", null,
                    h("strong", null, mood),
                    h("span", null, `${LIVE_RESEARCH_NOTE} Meanwhile: ${pickForSession(WAIT_FACTS, session, 2)}`)
                ),
                h("div", { className: "draft-pill" }, "Live feed")
            );
        }

        function renderCookingState(session, evidence) {
            const mode = getSessionMode(session);
            if (mode === "fast") {
                return h("div", { className: "empty-state", style: { position: "relative" } },
                    h("div", { className: "scan-sweep" }),
                    h("div", { style: { position: "relative", zIndex: 1 } },
                        h("strong", null, "Quick run in progress"),
                        h("span", null, evidence.length ? `${evidence.length} sources acquired.` : "Search warming up.")
                    )
                );
            }
            return h("div", { className: "empty-state", style: { position: "relative" } },
                h("div", { className: "scan-sweep" }),
                h("div", { className: "cook-card", style: { position: "relative", zIndex: 1 } },
                    h("div", { className: "cook-kicker" }, mode === "deep" ? "Deep dive active" : "Standard run active"),
                    h("div", { className: "cook-title" }, pickForSession(COOK_LINES, session, 0)),
                    h("div", { className: "cook-copy" },
                        evidence.length
                            ? `${evidence.length} sources acquired. ${LIVE_RESEARCH_NOTE}`
                            : `Sensors calibrating. ${LIVE_RESEARCH_NOTE}`
                    ),
                    h("div", { className: "fact-strip" },
                        h("div", { className: "fact-badge" }, "?"),
                        h("div", { className: "fact-text" }, pickForSession(WAIT_FACTS, session, 0))
                    )
                )
            );
        }

        function TelemetryFeed({ session, evidence }) {
            const [lines, setLines] = React.useState([]);
            const prevPhase = React.useRef("");
            const prevEvidenceCount = React.useRef(0);

            React.useEffect(() => {
                if (!session) return;
                const newLines = [];
                const phase = session.phase || "";
                const status = session.status || "";
                const evCount = evidence.length;

                if (status === "planning" || status === "executing") {
                    newLines.push({ text: `Phase: ${phase.replace("phase_", "")} | Status: ${status}`, type: "active" });
                }
                if (evCount > prevEvidenceCount.current) {
                    newLines.push({ text: `Source acquired [${evCount}]`, type: "done" });
                }
                if (phase === "phase_2" && prevPhase.current === "phase_1") {
                    newLines.push({ text: "Verification started", type: "warn" });
                }
                if (phase === "phase_3" && prevPhase.current === "phase_2") {
                    newLines.push({ text: "Report writing started", type: "active" });
                }

                prevPhase.current = phase;
                prevEvidenceCount.current = evCount;

                if (newLines.length > 0) {
                    setLines(prev => [...prev.slice(-4), ...newLines]);
                }
            }, [session, evidence.length]);

            if (lines.length === 0) {
                return h("div", { className: "telemetry-feed" },
                    h("div", { className: "telemetry-line", style: { animationDelay: "0s" } }, "Awaiting updates...")
                );
            }

            return h("div", { className: "telemetry-feed" },
                lines.map((line, i) =>
                    h("div", {
                        key: i,
                        className: `telemetry-line ${line.type}`,
                        style: { animationDelay: `${i * 0.05}s` }
                    }, `> ${line.text}`)
                )
            );
        }

        function isInstantDraft(session) {
            return Boolean(
                session && session.progress && session.progress.phase_3 && session.progress.phase_3.instant
            );
        }

        function getSessionMode(session) {
            return session && session.progress && session.progress.settings
                ? session.progress.settings.mode || "fast"
                : "fast";
        }

        function pickForSession(items, session, salt) {
            const seed = [
                session && session.session_id ? session.session_id : "ready",
                session && session.phase ? session.phase : "phase",
                session && session.evidence_count ? session.evidence_count : 0,
                salt
            ].join("-");
            let total = 0;
            for (let index = 0; index < seed.length; index += 1) {
                total += seed.charCodeAt(index);
            }
            return items[total % items.length];
        }

        function renderVisualGuide(session, evidence) {
            const topic = session && session.topic ? session.topic : "your topic";
            const captions = buildVisualCaptions(topic, evidence);
            return h("div", { className: "visual-grid" },
                captions.map((card, index) => h("div", { className: "visual-card", key: card.title },
                    h("div", { className: "signal-stage" },
                        h("div", { className: "signal-ring" }),
                        h("div", { className: "signal-ring" }),
                        h("div", { className: "signal-ring" }),
                        h("div", { className: "signal-core" })
                    ),
                    h("div", { className: "visual-kicker" }, `Array ${index + 1}`),
                    h("div", { className: "visual-title" }, card.title),
                    h("div", { className: "visual-copy" }, card.copy)
                ))
            );
        }

        function buildVisualCaptions(topic, evidence) {
            const cleanClaims = evidence
                .map(item => item.claim || "")
                .filter(Boolean)
                .slice(0, 3);
            return [
                {
                    title: "Main Finding",
                    copy: cleanClaims[0]
                        ? shorten(cleanClaims[0], 150)
                        : `${topic} is the focus. The agent is collecting sources to map the landscape.`
                },
                {
                    title: "Key Insight",
                    copy: cleanClaims[1]
                        ? shorten(cleanClaims[1], 150)
                        : "Watch for trends, events, or patterns that shape the topic."
                },
                {
                    title: "Why It Matters",
                    copy: cleanClaims[2]
                        ? shorten(cleanClaims[2], 150)
                        : "The final report converts raw sources into structured findings with citations."
                }
            ];
        }

        function shorten(text, max) {
            if (text.length <= max) return text;
            return `${text.slice(0, max).replace(/\s+\S*$/, "")}...`;
        }

        async function loadReport(sessionId, setReport, setMessage) {
            try {
                const response = await fetch(`${API_BASE}/api/research/${sessionId}/report-text`);
                if (!response.ok) throw new Error("Report generated, but could not be loaded.");
                const data = await response.json();
                setReport((data.content || "").trim());
            } catch (error) {
                setMessage(error.message);
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
</body>
</html>
