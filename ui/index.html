<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Research Agent</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #030108;
            --deep-purple: #0a0514;
            --panel-bg: rgba(8, 4, 16, 0.78);
            --panel-border: rgba(0, 240, 255, 0.12);
            --holo-cyan: #00f0ff;
            --holo-cyan-dim: rgba(0, 240, 255, 0.12);
            --holo-cyan-glow: rgba(0, 240, 255, 0.35);
            --amber: #ff9e40;
            --amber-dim: rgba(255, 158, 64, 0.2);
            --ink: #e0d8f0;
            --muted: #6b5f80;
            --line: rgba(0, 240, 255, 0.1);
            --hot: #ff5a8a;
            --hot-dim: rgba(255, 90, 138, 0.2);
            --green: #00ffaa;
            --shadow: 0 34px 95px rgba(0, 0, 0, 0.72);
            --font-display: "Orbitron", sans-serif;
            --font-body: "Rajdhani", sans-serif;
            --font-mono: "Share Tech Mono", monospace;
            --ease-cinematic: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-snap: cubic-bezier(0.87, 0, 0.13, 1);
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: var(--font-body);
            background: var(--void);
            overflow-x: hidden;
        }

        #void-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 240, 255, 0.015) 2px,
                    rgba(0, 240, 255, 0.015) 4px
                );
            opacity: 0.6;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--void); }
        ::-webkit-scrollbar-thumb { background: var(--holo-cyan-dim); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--holo-cyan); }

        button, input, select { font: inherit; }
        button { border: 0; background: none; cursor: pointer; }

        /* ===== SCROLL REVEAL SYSTEM ===== */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.9s var(--ease-cinematic), transform 0.9s var(--ease-cinematic);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.35s; }
        .reveal-delay-4 { transition-delay: 0.5s; }
        .reveal-delay-5 { transition-delay: 0.7s; }

        /* ===== HERO ENTRANCE ANIMATIONS ===== */
        .hero-entrance {
            opacity: 0;
            transform: translateY(60px);
            animation: heroFadeUp 1.2s var(--ease-cinematic) forwards;
        }
        .hero-entrance-delay-1 { animation-delay: 0.2s; }
        .hero-entrance-delay-2 { animation-delay: 0.45s; }
        .hero-entrance-delay-3 { animation-delay: 0.7s; }
        .hero-entrance-delay-4 { animation-delay: 0.95s; }
        .hero-entrance-delay-5 { animation-delay: 1.2s; }

        @keyframes heroFadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== AURORA BACKGROUND ===== */
        .aurora-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(60, 20, 120, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(0, 240, 255, 0.06), transparent);
            animation: auroraShift 20s ease-in-out infinite alternate;
        }

        @keyframes auroraShift {
            0% { transform: translateX(-5%) translateY(-3%) scale(1.05); }
            100% { transform: translateX(5%) translateY(3%) scale(0.95); }
        }

        .app {
            position: relative;
            z-index: 2;
            width: min(1500px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 0 0 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: auto;
            padding: 80px 0 40px;
            text-align: center;
            position: relative;
        }

        .footer-signature {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .footer-label {
            color: var(--holo-cyan);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .footer-name {
            color: var(--ink);
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-shadow:
                0 0 20px rgba(0, 240, 255, 0.15),
                0 0 40px rgba(100, 50, 200, 0.1);
            transition: text-shadow 0.5s ease;
        }

        .footer:hover .footer-name {
            text-shadow:
                0 0 30px rgba(0, 240, 255, 0.3),
                0 0 60px rgba(100, 50, 200, 0.15);
        }

        .footer-glow-line {
            width: 100px;
            height: 1px;
            margin-top: 12px;
            background: linear-gradient(90deg, transparent, var(--holo-cyan), transparent);
            opacity: 0.4;
            animation: footerGlowPulse 3s ease-in-out infinite;
        }

        @keyframes footerGlowPulse {
            0%, 100% { opacity: 0.3; width: 80px; }
            50% { opacity: 0.6; width: 120px; }
        }

        .footer-sparkles {
            position: absolute;
            inset: -20px -40px;
            pointer-events: none;
        }

        .footer-sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--holo-cyan);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--holo-cyan);
            animation: sparkleFloat 4s ease-in-out infinite;
        }

        .footer-sparkle:nth-child(1) { top: 0; left: 20%; animation-delay: 0s; }
        .footer-sparkle:nth-child(2) { top: 40%; left: 5%; animation-delay: 1s; }
        .footer-sparkle:nth-child(3) { top: 10%; right: 15%; animation-delay: 2s; }
        .footer-sparkle:nth-child(4) { bottom: 20%; right: 10%; animation-delay: 0.5s; }
        .footer-sparkle:nth-child(5) { bottom: 10%; left: 25%; animation-delay: 1.5s; }

        @keyframes sparkleFloat {
            0%, 100% { opacity: 0.2; transform: scale(1) translateY(0); }
            50% { opacity: 0.8; transform: scale(1.5) translateY(-4px); }
        }

        /* ===== HERO SECTION ===== */
        .hero {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 50%, rgba(60, 20, 100, 0.15), transparent 70%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 240, 255, 0.06), transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-glyph {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            color: var(--holo-cyan);
            opacity: 0;
            text-transform: uppercase;
            margin-bottom: 24px;
            animation: glyphPulse 4s ease-in-out infinite, heroFadeUp 1s var(--ease-cinematic) 0.1s forwards;
        }

        @keyframes glyphPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .hero h1 {
            margin: 0;
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 7vw, 6.5rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink);
            text-shadow:
                0 0 40px rgba(0, 240, 255, 0.2),
                0 0 80px rgba(100, 50, 200, 0.15);
        }

        .hero-line { display: block; }

        .hero-accent {
            color: var(--holo-cyan);
            text-shadow:
                0 0 30px rgba(0, 240, 255, 0.4),
                0 0 60px rgba(0, 240, 255, 0.2);
        }

        .hero-sub {
            margin-top: 28px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            letter-spacing: 0.25em;
            color: var(--muted);
            text-transform: uppercase;
            opacity: 0;
            animation: heroFadeUp 1s var(--ease-cinematic) 1.1s forwards;
        }

        .hero-divider {
            width: 120px;
            height: 1px;
            margin: 32px auto;
            background: linear-gradient(90deg, transparent, var(--holo-cyan), transparent);
            opacity: 0;
            animation: heroFadeUp 1s var(--ease-cinematic) 0.85s forwards;
        }

        .hero-desc {
            max-width: 560px;
            margin: 0 auto;
            color: var(--muted);
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 400;
            opacity: 0;
            animation: heroFadeUp 1s var(--ease-cinematic) 1.3s forwards;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--holo-cyan);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            opacity: 0;
            animation: heroFadeUp 1s var(--ease-cinematic) 1.6s forwards, bounce 2s ease-in-out infinite 2s;
            background: none;
            border: none;
            cursor: pointer;
        }

        .scroll-indicator svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* ===== SECTION DIVIDER ===== */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 40px 0;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0;
        }
        .section-divider.visible { opacity: 1; }
        .section-divider.visible .divider-line { width: 100%; }
        .section-divider.visible .hex-icon { transform: scale(1) rotate(0deg); opacity: 0.5; }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--panel-border), transparent);
            width: 0%;
            transition: width 1.2s var(--ease-cinematic);
        }

        .hex-icon {
            width: 12px;
            height: 14px;
            background: var(--holo-cyan);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            opacity: 0;
            transform: scale(0) rotate(45deg);
            transition: all 0.8s var(--ease-cinematic) 0.3s;
            animation: hexPulse 2s ease-in-out infinite 1.5s;
        }

        @keyframes hexPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* ===== WORKBENCH ===== */
        .workbench {
            display: grid;
            grid-template-columns: minmax(0, 1.55fr) minmax(330px, 0.8fr);
            gap: 22px;
            align-items: start;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--holo-cyan), transparent);
            opacity: 0.4;
        }

        .control-panel, .report-panel, .side-panel { border-radius: 4px; }

        .control-panel {
            padding: 28px;
            margin-bottom: 22px;
            margin-top: 2px;
            background:
                linear-gradient(145deg, rgba(0, 240, 255, 0.04), transparent 40%),
                var(--panel-bg);
            border: 1px solid rgba(0, 240, 255, 0.18);
            box-shadow:
                0 0 40px rgba(0, 240, 255, 0.04),
                var(--shadow);
        }

        .search-prompt {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            color: var(--holo-cyan);
            font-family: var(--font-display);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .search-prompt::before {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--holo-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--holo-cyan);
            animation: promptPulse 2s ease-in-out infinite;
        }

        @keyframes promptPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        input[type="text"].search-input {
            border: 1px solid rgba(0, 240, 255, 0.25);
            background: rgba(3, 1, 8, 0.85);
            font-size: 1.1rem;
            height: 54px;
            animation: inputGlow 3s ease-in-out infinite;
        }

        @keyframes inputGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); }
            50% { box-shadow: 0 0 16px rgba(0, 240, 255, 0.08); }
        }

        input[type="text"].search-input:focus {
            border-color: var(--holo-cyan);
            box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.1), 0 0 30px rgba(0, 240, 255, 0.12);
            animation: none;
        }

        .control-grid {
            display: grid;
            grid-template-columns: minmax(260px, 1.4fr) 170px minmax(210px, 0.9fr);
            gap: 14px;
        }

        label {
            display: block;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-bottom: 9px;
            text-transform: uppercase;
        }

        input[type="text"], select {
            width: 100%;
            height: 48px;
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background: rgba(3, 1, 8, 0.7);
            color: var(--ink);
            padding: 0 14px;
            outline: none;
            font-family: var(--font-body);
            font-size: 1rem;
            letter-spacing: 0.02em;
            transition: border-color 0.3s var(--ease-cinematic), box-shadow 0.3s var(--ease-cinematic);
        }

        input[type="text"]::placeholder { color: var(--muted); opacity: 0.5; }

        .select-shell { position: relative; }

        .select-shell select {
            appearance: none;
            -webkit-appearance: none;
            padding-right: 44px;
            background:
                linear-gradient(145deg, rgba(0, 240, 255, 0.06), rgba(100, 50, 200, 0.04)),
                rgba(3, 1, 8, 0.9);
            border-color: var(--panel-border);
            box-shadow: inset 0 1px 0 rgba(0, 240, 255, 0.05);
        }

        .select-shell::after {
            content: "";
            position: absolute;
            right: 16px;
            top: 50%;
            width: 8px;
            height: 8px;
            border-right: 1.5px solid var(--holo-cyan);
            border-bottom: 1.5px solid var(--holo-cyan);
            transform: translateY(-65%) rotate(45deg);
            pointer-events: none;
            opacity: 0.7;
        }

        .select-shell.disabled { opacity: 0.5; }

        select option { color: var(--ink); background: #0a0514; }

        input[type="text"]:focus, select:focus {
            border-color: var(--holo-cyan);
            box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.08), 0 0 24px rgba(0, 240, 255, 0.1);
        }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .mode-card {
            min-height: 100px;
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background:
                linear-gradient(145deg, rgba(0, 240, 255, 0.04), transparent),
                rgba(255, 255, 255, 0.02);
            color: var(--ink);
            cursor: pointer;
            padding: 14px;
            text-align: left;
            transition: transform 0.4s var(--ease-cinematic), border-color 0.4s var(--ease-cinematic), background 0.4s var(--ease-cinematic), box-shadow 0.4s var(--ease-cinematic);
            position: relative;
            overflow: hidden;
        }

        .mode-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: transparent;
            transition: background 0.4s var(--ease-cinematic);
        }

        .mode-card::after {
            content: "";
            position: absolute;
            inset: 0;
            border: 1px solid transparent;
            border-radius: 2px;
            transition: border-color 0.4s var(--ease-cinematic);
            pointer-events: none;
        }

        .mode-card:hover {
            transform: translateY(-3px) scale(1.01);
            border-color: rgba(0, 240, 255, 0.35);
            background: rgba(0, 240, 255, 0.04);
            box-shadow: 0 12px 40px rgba(0, 240, 255, 0.06);
        }

        .mode-card:hover::after {
            border-color: rgba(0, 240, 255, 0.15);
        }

        .mode-card.active {
            background:
                linear-gradient(145deg, rgba(0, 240, 255, 0.08), rgba(100, 50, 200, 0.06)),
                rgba(255, 255, 255, 0.03);
            border-color: var(--holo-cyan);
            box-shadow: inset 0 0 0 1px rgba(0, 240, 255, 0.15), 0 0 30px rgba(0, 240, 255, 0.08);
        }

        .mode-card.active::before {
            background: var(--holo-cyan);
            box-shadow: 0 0 12px var(--holo-cyan);
        }

        .mode-name {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .mode-copy {
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.4;
        }

        .run-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 14px;
            align-items: center;
            margin-top: 18px;
        }

        .verify-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.82rem;
            letter-spacing: 0.05em;
        }

        .verify-toggle input {
            width: 16px;
            height: 16px;
            accent-color: var(--holo-cyan);
            cursor: pointer;
        }

        .primary-button {
            min-width: 200px;
            height: 52px;
            border-radius: 2px;
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.15), rgba(100, 50, 200, 0.15));
            border: 1px solid var(--holo-cyan);
            color: var(--holo-cyan);
            cursor: pointer;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: transform 0.4s var(--ease-cinematic), background 0.4s var(--ease-cinematic), box-shadow 0.4s var(--ease-cinematic);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.03);
            position: relative;
            overflow: hidden;
        }

        .primary-button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.1), transparent);
            transition: left 0.6s var(--ease-cinematic);
        }

        .primary-button:hover:not(:disabled) {
            transform: translateY(-2px);
            background: rgba(0, 240, 255, 0.12);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2), inset 0 0 20px rgba(0, 240, 255, 0.05);
        }

        .primary-button:hover:not(:disabled)::before {
            left: 100%;
        }

        .primary-button:disabled {
            cursor: not-allowed;
            opacity: 0.4;
            border-color: var(--muted);
            color: var(--muted);
            box-shadow: none;
        }

        .message {
            margin-top: 12px;
            color: var(--hot);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .report-panel {
            min-height: 680px;
            overflow: hidden;
        }

        .report-head {
            padding: 24px;
            border-bottom: 1px solid var(--panel-border);
            background:
                linear-gradient(135deg, rgba(0, 240, 255, 0.04), rgba(100, 50, 200, 0.03)),
                repeating-linear-gradient(120deg, rgba(0, 240, 255, 0.02) 0 1px, transparent 1px 20px);
        }

        .report-title-row {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: flex-start;
        }

        .report-title {
            margin: 0;
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 2.6vw, 2.6rem);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .status-pill {
            flex: 0 0 auto;
            border-radius: 2px;
            border: 1px solid var(--panel-border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--amber);
            padding: 6px 14px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .progress-shell { margin-top: 20px; }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .progress-track {
            height: 6px;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.04);
            overflow: hidden;
            position: relative;
        }

        .progress-track::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(0, 240, 255, 0.06) 8px, rgba(0, 240, 255, 0.06) 9px);
        }

        .progress-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--holo-cyan), var(--amber));
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.35), 0 0 40px rgba(0, 240, 255, 0.1);
            transition: width 0.8s var(--ease-cinematic);
            position: relative;
        }

        .progress-fill::after {
            content: "";
            position: absolute;
            right: 0;
            top: -2px;
            bottom: -2px;
            width: 4px;
            background: var(--holo-cyan);
            box-shadow: 0 0 12px var(--holo-cyan), 0 0 24px var(--holo-cyan);
            animation: progressPulse 1.5s ease-in-out infinite;
        }

        @keyframes progressPulse {
            0%, 100% { opacity: 0.6; box-shadow: 0 0 8px var(--holo-cyan); }
            50% { opacity: 1; box-shadow: 0 0 20px var(--holo-cyan), 0 0 40px rgba(0, 240, 255, 0.3); }
        }

        /* ===== LIVE TELEMETRY ===== */
        .telemetry-feed {
            margin-top: 16px;
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background: rgba(0, 0, 0, 0.25);
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            line-height: 1.6;
            max-height: 120px;
            overflow: hidden;
            position: relative;
        }

        .telemetry-feed::before {
            content: ">>> LIVE TELEMETRY";
            display: block;
            color: var(--holo-cyan);
            letter-spacing: 0.15em;
            font-size: 0.65rem;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .telemetry-line {
            color: var(--muted);
            opacity: 0;
            transform: translateX(-8px);
            animation: telemetryIn 0.4s var(--ease-cinematic) forwards;
        }

        .telemetry-line.active { color: var(--holo-cyan); }
        .telemetry-line.done { color: var(--green); opacity: 0.5; }
        .telemetry-line.warn { color: var(--amber); }

        @keyframes telemetryIn {
            to { opacity: 1; transform: translateX(0); }
        }

        /* ===== SCAN SWEEP ===== */
        .scan-sweep {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .scan-sweep::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.03), transparent);
            animation: scanSweep 3s ease-in-out infinite;
        }

        @keyframes scanSweep {
            0% { left: -60%; }
            100% { left: 100%; }
        }

        /* ===== EVIDENCE ENTRANCE ===== */
        .evidence-card {
            border: 1px solid var(--panel-border);
            border-left: 2px solid var(--holo-cyan);
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            transition: background 0.3s var(--ease-cinematic), transform 0.3s var(--ease-cinematic), box-shadow 0.3s var(--ease-cinematic);
            opacity: 0;
            transform: translateY(12px) translateX(-4px);
            animation: evidenceIn 0.5s var(--ease-cinematic) forwards;
        }

        @keyframes evidenceIn {
            to { opacity: 1; transform: translateY(0) translateX(0); }
        }

        .evidence-card:hover {
            background: rgba(0, 240, 255, 0.03);
            transform: translateX(4px);
            box-shadow: -4px 0 16px rgba(0, 240, 255, 0.06);
        }

        /* ===== STATUS PULSE ===== */
        .status-pill.pulse {
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 158, 64, 0.2); }
            50% { box-shadow: 0 0 0 8px rgba(255, 158, 64, 0); }
        }

        /* ===== KINETIC TABS ===== */
        .view-tabs {
            display: flex;
            gap: 0;
            padding: 0;
            border-bottom: 1px solid var(--panel-border);
            position: relative;
        }

        .tab {
            border: none;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            padding: 14px 20px;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: color 0.3s var(--ease-cinematic), background 0.3s var(--ease-cinematic);
            position: relative;
        }

        .tab:hover { color: var(--ink); background: rgba(0, 240, 255, 0.03); }

        .tab.active { color: var(--holo-cyan); background: rgba(0, 240, 255, 0.04); }

        .tab-slider {
            position: absolute;
            bottom: 0;
            height: 2px;
            background: var(--holo-cyan);
            box-shadow: 0 0 8px var(--holo-cyan-glow);
            transition: left 0.4s var(--ease-cinematic), width 0.4s var(--ease-cinematic);
        }

        .report-body {
            padding: 24px;
            max-height: 760px;
            overflow: auto;
        }

        .empty-state {
            display: grid;
            min-height: 420px;
            place-items: center;
            color: var(--muted);
            text-align: center;
        }

        .empty-state strong {
            display: block;
            color: var(--ink);
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* ===== SHIMMER / AURORA LOADING ===== */
        .cook-card {
            width: min(720px, 100%);
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background:
                linear-gradient(145deg, rgba(0, 240, 255, 0.04), rgba(100, 50, 200, 0.03)),
                rgba(255, 255, 255, 0.02);
            box-shadow: 0 26px 80px rgba(0, 0, 0, 0.3);
            padding: 28px;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .cook-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--holo-cyan);
            box-shadow: 0 0 12px var(--holo-cyan);
        }

        .cook-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.03), transparent);
            transform: translateX(-100%);
            animation: shimmerSlide 3s ease-in-out infinite;
        }

        @keyframes shimmerSlide {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
            100% { transform: translateX(100%); }
        }

        .cook-kicker {
            color: var(--holo-cyan);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .cook-title {
            margin: 10px 0 12px;
            color: var(--ink);
            font-family: var(--font-display);
            font-size: clamp(1.4rem, 2.6vw, 2.2rem);
            font-weight: 700;
            letter-spacing: 0.06em;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .cook-copy {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.55;
        }

        .fact-strip {
            display: grid;
            grid-template-columns: 36px 1fr;
            gap: 14px;
            align-items: start;
            margin-top: 22px;
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background: rgba(0, 240, 255, 0.03);
            padding: 16px;
        }

        .fact-badge {
            display: grid;
            width: 36px;
            height: 36px;
            place-items: center;
            background: rgba(0, 240, 255, 0.08);
            color: var(--holo-cyan);
            font-family: var(--font-mono);
            font-weight: 400;
            font-size: 1rem;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .fact-text {
            color: var(--ink);
            line-height: 1.45;
        }

        .draft-banner {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: center;
            margin-bottom: 18px;
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background:
                linear-gradient(135deg, rgba(0, 240, 255, 0.05), rgba(100, 50, 200, 0.03)),
                rgba(255, 255, 255, 0.02);
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        .draft-banner::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.02), transparent);
            transform: translateX(-100%);
            animation: shimmerSlide 4s ease-in-out infinite;
        }

        .draft-banner strong {
            display: block;
            color: var(--ink);
            font-family: var(--font-display);
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .draft-banner span {
            color: var(--muted);
            line-height: 1.45;
            font-size: 0.9rem;
        }

        .draft-pill {
            border-radius: 2px;
            background: rgba(0, 240, 255, 0.08);
            color: var(--holo-cyan);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            padding: 8px 12px;
            text-transform: uppercase;
            white-space: nowrap;
            border: 1px solid var(--panel-border);
        }

        .markdown {
            font-size: 1.05rem;
            line-height: 1.75;
        }

        .markdown h1, .markdown h2, .markdown h3 {
            line-height: 1.15;
            font-family: var(--font-display);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .markdown h1 { font-size: 1.9rem; }
        .markdown h2 {
            margin-top: 34px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--panel-border);
        }
        .markdown h3 { margin-top: 24px; }
        .markdown a { color: var(--holo-cyan); }
        .markdown code {
            background: rgba(0, 240, 255, 0.06);
            padding: 2px 6px;
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 0.9em;
        }
        .markdown pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 2px;
            border: 1px solid var(--panel-border);
            overflow-x: auto;
        }
        .markdown pre code { background: none; padding: 0; }
        .markdown blockquote {
            border-left: 2px solid var(--holo-cyan);
            margin: 16px 0;
            padding-left: 16px;
            color: var(--muted);
        }

        .evidence-list { display: grid; gap: 12px; }

        /* evidence-card styles moved above with animation */

        .visual-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .visual-card {
            position: relative;
            min-height: 310px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background:
                radial-gradient(circle at 30% 16%, rgba(0, 240, 255, 0.08), transparent 25%),
                linear-gradient(155deg, rgba(100, 50, 200, 0.1), rgba(0, 240, 255, 0.04));
            padding: 16px;
            transition: transform 0.4s var(--ease-cinematic), box-shadow 0.4s var(--ease-cinematic);
        }

        .visual-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(0, 240, 255, 0.06);
        }

        .visual-card::before {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(0, 240, 255, 0.08);
            border-radius: 2px;
            pointer-events: none;
        }

        .signal-stage {
            position: relative;
            height: 150px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signal-core {
            width: 60px;
            height: 60px;
            border: 1.5px solid var(--holo-cyan);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 24px rgba(0, 240, 255, 0.2);
            position: relative;
            animation: pulseHex 3s ease-in-out infinite;
        }

        @keyframes pulseHex {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        .signal-ring {
            position: absolute;
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 50%;
            animation: signalExpand 3s ease-out infinite;
        }

        .signal-ring:nth-child(1) { width: 100px; height: 100px; animation-delay: 0s; }
        .signal-ring:nth-child(2) { width: 140px; height: 140px; animation-delay: 0.6s; }
        .signal-ring:nth-child(3) { width: 180px; height: 180px; animation-delay: 1.2s; }

        @keyframes signalExpand {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .visual-kicker {
            color: var(--holo-cyan);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .visual-title {
            margin: 6px 0 8px;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .visual-copy {
            color: var(--muted);
            line-height: 1.45;
            font-size: 0.92rem;
        }

        .evidence-card strong {
            display: block;
            line-height: 1.45;
            font-weight: 600;
        }

        .source {
            margin-top: 8px;
            color: var(--holo-cyan);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            opacity: 0.7;
            overflow-wrap: anywhere;
        }

        .confidence {
            margin-top: 6px;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .side-panel {
            position: sticky;
            top: 18px;
            padding: 24px;
        }

        .side-title {
            margin: 0 0 16px;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--holo-cyan);
            opacity: 0.8;
        }

        .phase-list { display: grid; gap: 14px; }

        .phase-item {
            display: grid;
            grid-template-columns: 38px 1fr;
            gap: 12px;
            align-items: start;
            transition: transform 0.3s var(--ease-cinematic);
        }

        .phase-item:hover { transform: translateX(4px); }

        .phase-dot {
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: 400;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            transition: background 0.5s var(--ease-cinematic), color 0.5s var(--ease-cinematic), box-shadow 0.5s var(--ease-cinematic), transform 0.5s var(--ease-cinematic);
        }

        .phase-item.active .phase-dot {
            background: var(--amber);
            color: var(--void);
            box-shadow: 0 0 16px var(--amber-dim);
            transform: rotate(360deg);
        }

        .phase-item.done .phase-dot {
            background: var(--green);
            color: var(--void);
            box-shadow: 0 0 16px rgba(0, 255, 170, 0.2);
        }

        .phase-name {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.88rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .phase-copy {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .stat {
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.03);
            padding: 14px;
            transition: background 0.3s var(--ease-cinematic), border-color 0.3s var(--ease-cinematic);
        }

        .stat:hover {
            background: rgba(0, 240, 255, 0.03);
            border-color: rgba(0, 240, 255, 0.2);
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--holo-cyan);
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
        }

        .stat-label {
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .possibilities {
            border-top: 1px solid var(--panel-border);
            margin-top: 18px;
            padding-top: 16px;
        }

        .history-panel {
            border-top: 1px solid var(--panel-border);
            margin-top: 18px;
            padding-top: 16px;
        }

        .history-list { display: grid; gap: 10px; }

        .history-button {
            width: 100%;
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--ink);
            cursor: pointer;
            padding: 12px;
            text-align: left;
            transition: border-color 0.3s var(--ease-cinematic), transform 0.3s var(--ease-cinematic), background 0.3s var(--ease-cinematic);
            font-family: var(--font-body);
        }

        .history-button:hover {
            border-color: var(--holo-cyan);
            transform: translateY(-2px);
            background: rgba(0, 240, 255, 0.04);
        }

        .history-topic {
            display: block;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.95rem;
        }

        .history-meta {
            display: block;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .clear-history {
            margin-top: 10px;
            color: var(--muted);
            background: transparent;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0;
            transition: color 0.3s var(--ease-cinematic);
        }

        .clear-history:hover { color: var(--hot); }

        .possibility {
            margin-bottom: 14px;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .possibility strong {
            color: var(--ink);
            font-weight: 600;
        }

        .error-box {
            border: 1px solid rgba(255, 90, 138, 0.3);
            border-radius: 2px;
            background: rgba(255, 90, 138, 0.05);
            color: var(--hot);
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }

        /* Glitch text effect */
        .glitch {
            position: relative;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
        }

        @media (prefers-reduced-motion: no-preference) {
            .glitch:hover::before {
                animation: glitch1 0.3s ease-in-out;
                color: var(--holo-cyan);
                opacity: 0.6;
                clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
                transform: translate(-2px, -1px);
            }
            .glitch:hover::after {
                animation: glitch2 0.3s ease-in-out;
                color: var(--hot);
                opacity: 0.4;
                clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
                transform: translate(2px, 1px);
            }
        }

        @keyframes glitch1 {
            0%, 100% { transform: translate(-2px, -1px); }
            25% { transform: translate(2px, 1px); }
            50% { transform: translate(-1px, 2px); }
            75% { transform: translate(1px, -2px); }
        }
        @keyframes glitch2 {
            0%, 100% { transform: translate(2px, 1px); }
            25% { transform: translate(-2px, -1px); }
            50% { transform: translate(1px, -2px); }
            75% { transform: translate(-1px, 2px); }
        }

        @media (max-width: 1050px) {
            .workbench, .control-grid { grid-template-columns: 1fr; }
            .side-panel { position: static; }
            .hero h1 { font-size: clamp(2rem, 10vw, 4rem); }
        }

        @media (max-width: 720px) {
            .app { width: calc(100vw - 20px); padding: 10px 0 20px; }
            .hero { min-height: auto; padding: 60px 16px 32px; }
            .hero-content { max-width: 100%; }
            .hero h1 { font-size: clamp(1.5rem, 10vw, 2.6rem); letter-spacing: 0.05em; line-height: 1.1; }
            .hero-glyph { font-size: 0.65rem; margin-bottom: 14px; }
            .hero-sub { font-size: 0.62rem; letter-spacing: 0.12em; margin-top: 16px; }
            .hero-desc { font-size: 0.88rem; padding: 0 4px; line-height: 1.5; margin-top: 0; }
            .hero-divider { margin: 16px auto; width: 80px; }
            .scroll-indicator { display: none; }
            .section-divider { margin: 24px 0; font-size: 0.6rem; }
            .control-panel { padding: 20px 16px; }
            .control-grid { grid-template-columns: 1fr; gap: 12px; }

            .run-row { margin-top: 14px; }
            .mode-grid, .stat-grid, .visual-grid { grid-template-columns: 1fr; }
            .mode-card { min-height: 80px; padding: 12px; }
